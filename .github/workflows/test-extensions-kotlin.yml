name: Test Anime Extensions (Kotlin)

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      languages:
        description: "Languages to test (space-separated, empty = all)"
        required: false
        default: ""
      categories:
        description: "Test categories to run (space-separated, empty = all)"
        required: false
        default: ""
      max_concurrent:
        description: "Max concurrent HTTP requests"
        required: false
        default: "20"
  pull_request:
    paths:
      - "src/**"
      - "test-runner/**"
      - "test-framework/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/test-extensions-kotlin.yml"

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

env:
  JAVA_VERSION: "17"
  ANDROID_COMPILE_SDK: "34"
  GRADLE_VERSION: "8.7"

jobs:
  detect-languages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout testing suite
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect language groups
        id: set-matrix
        run: |
          cd repo
          # Find all language directories
          LANGS=$(ls -d src/*/ 2>/dev/null | sed 's|src/||' | sed 's|/$||' | tr '\n' ' ')
          echo "Found languages: $LANGS"

          # Group languages by size
          LARGE=""
          MEDIUM=""
          SMALL=""

          for LANG in $LANGS; do
            COUNT=$(find "src/$LANG" -name "build.gradle.kts" 2>/dev/null | wc -l)
            if [ "$COUNT" -gt 20 ]; then
              LARGE="$LARGE $LANG"
            elif [ "$COUNT" -gt 5 ]; then
              MEDIUM="$MEDIUM $LANG"
            else
              SMALL="$SMALL $LANG"
            fi
          done

          # Create matrix JSON
          echo "large=$LARGE" >> "$GITHUB_OUTPUT"
          echo "medium=$MEDIUM" >> "$GITHUB_OUTPUT"
          echo "small=$SMALL" >> "$GITHUB_OUTPUT"

  build-test-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout testing suite
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build test-runner
        run: |
          ./gradlew :test-runner:compileDebugKotlin :test-runner:jar --no-daemon

      - name: Upload test-runner JAR
        uses: actions/upload-artifact@v4
        with:
          name: test-runner-jar
          path: test-runner/build/libs/test-runner*.jar
          retention-days: 7

  test-extensions:
    needs: [detect-languages, build-test-runner]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: large
            langs: ${{ needs.detect-languages.outputs.large }}
          - name: medium
            langs: ${{ needs.detect-languages.outputs.medium }}
          - name: small
            langs: ${{ needs.detect-languages.outputs.small }}
    name: "Test ${{ matrix.name }}"

    steps:
      - name: Checkout testing suite
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download test-runner JAR
        uses: actions/download-artifact@v4
        with:
          name: test-runner-jar
          path: test-runner/build/libs/

      - name: Build test framework
        run: |
          ./gradlew :test-framework:compileDebugKotlin --no-daemon

      - name: Run extension tests
        env:
          JAVAUNBUFFERED: "1"
        run: |
          ARGS="--format all --output-dir ./reports --max-concurrent ${{ github.event.inputs.max_concurrent || '20' }}"
          LANGS="${{ matrix.langs }}"
          if [ -n "${{ github.event.inputs.languages }}" ]; then
            ARGS="$ARGS --languages ${{ github.event.inputs.languages }}"
          elif [ -n "$LANGS" ]; then
            ARGS="$ARGS --languages $LANGS"
          fi
          if [ -n "${{ github.event.inputs.categories }}" ]; then
            ARGS="$ARGS --categories ${{ github.event.inputs.categories }}"
          fi

          # Run tests using Gradle test task or direct JAR execution
          ./gradlew :test-runner:test --no-daemon --args="$ARGS" || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.name }}
          path: reports/
          retention-days: 30

  aggregate-reports:
    needs: test-extensions
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10

    steps:
      - name: Checkout testing suite
        uses: actions/checkout@v4

      - name: Download all report artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: reports-*
          merge-multiple: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Merge reports
        run: |
          # Find all JSON report files and merge them
          REPORTS_DIR="all-reports"
          mkdir -p reports

          # Look for any JSON files
          JSON_FILES=$(find "$REPORTS_DIR" -name "*.json" 2>/dev/null | head -20)
          if [ -n "$JSON_FILES" ]; then
            echo "Found report files:"
            echo "$JSON_FILES"
            # Copy first report as base
            cp $(echo "$JSON_FILES" | head -1) reports/report-merged.json
          else
            echo "No report files found"
            echo '{}' > reports/report-merged.json
          fi

      - name: Write job summary
        run: |
          if [ -f reports/report-merged.json ]; then
            echo "## Test Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "Reports found - see merged artifact for details" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload merged reports
        uses: actions/upload-artifact@v4
        with:
          name: merged-test-reports
          path: reports/
          retention-days: 30

  deploy-pages:
    needs: aggregate-reports
    runs-on: ubuntu-latest
    if: always() && needs.aggregate-reports.result == 'success'
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Download merged reports
        uses: actions/download-artifact@v4
        with:
          name: merged-test-reports
          path: reports

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4